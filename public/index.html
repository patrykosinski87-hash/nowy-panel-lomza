<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Lomza RP | Master Control</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="bg-glow"></div>

    <!-- MODAL MODERACJI -->
    <div id="modModal" class="modal-overlay">
        <div class="modal-card">
            <h2 id="modalTitle">MODERACJA GRACZA</h2>
            <p id="modalTarget">Nick: ...</p>
            <div class="input-group">
                <label>Powód akcji</label>
                <input type="text" id="modReason" placeholder="Wpisz powód...">
            </div>
            <div class="input-group" id="durationGroup">
                <label>Czas trwania</label>
                <select id="modDuration">
                    <option value="1h">1 Godzina</option>
                    <option value="12h">12 Godzin</option>
                    <option value="1d">1 Dzień</option>
                    <option value="7d">7 Dni</option>
                    <option value="perm">Permanentny</option>
                </select>
            </div>
            <div class="modal-btns">
                <button class="btn-primary" onclick="submitAction()">ZATWIERDŹ</button>
                <button class="btn-danger" onclick="closeModal()">ANULUJ</button>
            </div>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <h2 class="logo">LOMZA <span>TX</span></h2>
            <nav>
                <div class="nav-item active" onclick="tab('dash', this)"><i class="fas fa-home"></i> Dashboard</div>
                <div class="nav-item" onclick="tab('players', this)"><i class="fas fa-users"></i> Gracze</div>
                <div class="nav-item" onclick="tab('server', this)"><i class="fas fa-server"></i> Serwer</div>
            </nav>
            <div class="sidebar-footer">
                <span id="me-name">Admin</span>
                <i class="fas fa-sign-out-alt" onclick="logout()"></i>
            </div>
        </aside>

        <main class="main-content">
            <!-- DASHBOARD -->
            <section id="tab-dash" class="tab-page active">
                <header class="bento-card header-card">
                    <h1>Witaj, <span id="hello-txt" class="accent">...</span></h1>
                    <div id="clock">00:00</div>
                </header>
                <div class="stats-row">
                    <div class="bento-card stat-card"><p>ONLINE</p><span class="stat-val" id="stat-p">0</span></div>
                    <div class="bento-card stat-card"><p>STATUS</p><span class="stat-val" style="color:var(--success)">LIVE</span></div>
                </div>
            </section>

            <!-- PLAYERS -->
            <section id="tab-players" class="tab-page" style="display:none">
                <div class="bento-card">
                    <h2>ZARZĄDZANIE GRACZAMI</h2>
                    <table style="width:100%"><tbody id="p-list"></tbody></table>
                </div>
            </section>

            <!-- SERVER SETTINGS & ANNOUNCEMENTS -->
            <section id="tab-server" class="tab-page" style="display:none">
                <div class="bento-grid-2">
                    <div class="bento-card">
                        <h2>OGŁOSZENIE GLOBALNE</h2>
                        <p style="font-size:12px; opacity:0.6; margin-bottom:15px;">Wiadomość pojawi się na górze ekranu wszystkich graczy.</p>
                        <input type="text" id="announcementMsg" placeholder="Treść ogłoszenia...">
                        <button class="btn-primary" style="margin-top:10px;" onclick="sendAnnouncement()">WYŚLIJ OGŁOSZENIE</button>
                    </div>
                    <div class="bento-card">
                        <h2>KONTROLA SERWERA</h2>
                        <button class="btn-danger" style="width:100%; margin-top:10px;">GLOBAL KICK</button>
                        <button class="btn-primary" style="width:100%; margin-top:10px; background:#f59e0b">MAINTENANCE MODE</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let currentTarget = null;
        let currentAction = '';

        async function check() {
            const r = await fetch('/api/check'); const d = await r.json();
            if(!d.loggedIn) window.location.href = 'login.html';
            document.getElementById('me-name').innerText = d.user.name;
            document.getElementById('hello-txt').innerText = d.user.name;
            loadData();
        }
        check();

        function tab(id, el) {
            document.querySelectorAll('.tab-page').forEach(p => p.style.display = 'none');
            document.getElementById('tab-'+id).style.display = (id === 'dash' ? 'block' : 'block');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        async function loadData() {
            const r = await fetch('/api/data'); const d = await r.json();
            document.getElementById('stat-p').innerText = d.players.length;
            document.getElementById('p-list').innerHTML = d.players.map(p => `
                <tr>
                    <td>#${p.id}</td><td><b>${p.name}</b></td>
                    <td><button class="btn-s" onclick="openModal('KICK', ${p.id}, '${p.name}')">KICK</button>
                    <button class="btn-s btn-ban" onclick="openModal('BAN', ${p.id}, '${p.name}')">BAN</button></td>
                </tr>`).join('');
        }

        function openModal(action, id, name) {
            currentAction = action;
            currentTarget = {id, name};
            document.getElementById('modalTitle').innerText = action + " GRACZA";
            document.getElementById('modalTarget').innerText = "Cel: " + name + " (ID: " + id + ")";
            document.getElementById('durationGroup').style.display = (action === 'BAN' ? 'block' : 'none');
            document.getElementById('modModal').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modModal').style.display = 'none'; }

        async function submitAction() {
            const reason = document.getElementById('modReason').value;
            const duration = document.getElementById('modDuration').value;
            if(!reason) return alert("Podaj powód!");

            await fetch('/api/action', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ action: currentAction, ...currentTarget, reason, duration })
            });
            closeModal();
            loadData();
        }

        async function sendAnnouncement() {
            const msg = document.getElementById('announcementMsg').value;
            if(!msg) return;
            await fetch('/api/announcement', {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({ message: msg })
            });
            alert("Ogłoszenie wysłane!");
            document.getElementById('announcementMsg').value = '';
        }

        function logout() { fetch('/api/logout', {method:'POST'}).then(() => window.location.href='login.html'); }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
    </script>
</body>
</html>
