<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>txElite | Auth</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-body">
    <div class="bg-glow"></div>
    <div class="auth-card">
        <h1>txElite</h1>
        <p>SECURE ACCESS SYSTEM</p>
        <div style="margin-top:30px">
            <input type="text" id="u" placeholder="NAZWA UŻYTKOWNIKA" autocomplete="off">
            <input type="password" id="p" placeholder="HASŁO">
            <input type="text" id="c" placeholder="KOD ZAPROSZENIA" style="display:none">
            <button class="btn-primary" onclick="auth()" id="b">ZALOGUJ SIĘ</button>
            <p onclick="toggle()" style="margin-top:20px; font-size:12px; cursor:pointer; color:#64748b">Zmień tryb dostępu</p>
            <div id="m" style="margin-top:20px; font-weight:800; font-size:12px; color:var(--danger)"></div>
        </div>
    </div>
    <script>
        let isL = true;
        function toggle() { isL = !isL; document.getElementById('c').style.display = isL ? 'none':'block'; document.getElementById('b').innerText = isL ? 'ZALOGUJ SIĘ' : 'STWÓRZ KONTO'; }
        async function auth() {
            const r = await fetch('/api/' + (isL ? 'login' : 'register'), { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username: u.value, password: p.value, code: c.value}) });
            const d = await r.json();
            if(r.ok) window.location.href = 'index.html'; else document.getElementById('m').innerText = d.error;
        }
    </script>
</body>
</html>
